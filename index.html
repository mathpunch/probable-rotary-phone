<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escapa! Clone</title>
    <style>
        body {
            margin: 0;
            background-color: #121212;
            color: #e0e0e0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            border: 4px solid #444;
            width: 450px;
            height: 450px;
            background-color: #000;
            cursor: none;
        }
        canvas {
            display: block;
        }
        #ui {
            margin-top: 20px;
            text-align: center;
        }
        .timer { font-size: 24px; font-weight: bold; color: #00ff00; }
        .instructions { font-size: 14px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="timer">Time: <span id="time">0.000</span>s</div>
        <div id="high-score">Best: 0.000s</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="450" height="450"></canvas>
    </div>

    <div class="instructions">
        Click and drag the <b>Red Square</b>. Avoid the Blue Blocks and the Black Walls!
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timeDisplay = document.getElementById('time');
    const highScoreDisplay = document.getElementById('high-score');

    let startTime, elapsedTime = 0;
    let isPlaying = false;
    let highScore = 0;

    // Player Object
    const player = {
        x: 200, y: 200, size: 30, color: '#ff4d4d', dragging: false
    };

    // Enemy Blocks (Initial positions and velocities)
    let enemies = [
        { x: 50,  y: 50,  w: 60, h: 50, vx: 2, vy: 2.5 },
        { x: 300, y: 60,  w: 100, h: 20, vx: -2.5, vy: 2 },
        { x: 50,  y: 350, w: 30, h: 60, vx: 2.2, vy: -2.2 },
        { x: 320, y: 320, w: 60, h: 60, vx: -2, vy: -2.8 }
    ];

    function resetGame() {
        isPlaying = false;
        player.x = 210;
        player.y = 210;
        player.dragging = false;
        elapsedTime = 0;
        timeDisplay.innerText = "0.000";
        
        // Reset Enemy Positions
        enemies[0] = { x: 50,  y: 50,  w: 60, h: 50, vx: 2, vy: 2.5 };
        enemies[1] = { x: 300, y: 60,  w: 100, h: 20, vx: -2.5, vy: 2 };
        enemies[2] = { x: 50,  y: 350, w: 30, h: 60, vx: 2.2, vy: -2.2 };
        enemies[3] = { x: 320, y: 320, w: 60, h: 60, vx: -2, vy: -2.8 };
        draw();
    }

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.w &&
               rect1.x + rect1.size > rect2.x &&
               rect1.y < rect2.y + rect2.h &&
               rect1.y + rect1.size > rect2.y;
    }

    function update() {
        if (!isPlaying) return;

        elapsedTime = (Date.now() - startTime) / 1000;
        timeDisplay.innerText = elapsedTime.toFixed(3);

        // Speed multiplier increases slightly over time
        let speedMultiplier = 1 + (elapsedTime / 20);

        enemies.forEach(en => {
            en.x += en.vx * speedMultiplier;
            en.y += en.vy * speedMultiplier;

            // Wall Bounce
            if (en.x <= 0 || en.x + en.w >= canvas.width) en.vx *= -1;
            if (en.y <= 0 || en.y + en.h >= canvas.height) en.vy *= -1;

            // Check Collision with Player
            if (checkCollision(player, en)) gameOver();
        });

        // Check if player hits walls
        if (player.x <= 0 || player.x + player.size >= canvas.width || 
            player.y <= 0 || player.y + player.size >= canvas.height) {
            gameOver();
        }

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Enemies
        ctx.fillStyle = '#007bff';
        enemies.forEach(en => ctx.fillRect(en.x, en.y, en.w, en.h));

        // Draw Player
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.size, player.size);
    }

    function gameOver() {
        isPlaying = false;
        if (elapsedTime > highScore) {
            highScore = elapsedTime;
            highScoreDisplay.innerText = `Best: ${highScore.toFixed(3)}s`;
        }
        alert(`Game Over! Time: ${elapsedTime.toFixed(3)}s`);
        resetGame();
    }

    // Input Handling
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        if (mouseX >= player.x && mouseX <= player.x + player.size &&
            mouseY >= player.y && mouseY <= player.y + player.size) {
            player.dragging = true;
            if (!isPlaying) {
                isPlaying = true;
                startTime = Date.now();
                update();
            }
        }
    });

    window.addEventListener('mousemove', (e) => {
        if (player.dragging && isPlaying) {
            const rect = canvas.getBoundingClientRect();
            player.x = (e.clientX - rect.left) - (player.size / 2);
            player.y = (e.clientY - rect.top) - (player.size / 2);
        }
    });

    window.addEventListener('mouseup', () => {
        if (player.dragging && isPlaying) gameOver();
        player.dragging = false;
    });

    resetGame();
</script>
</body>
</html>
