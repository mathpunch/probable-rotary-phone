<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Escapa! Keyboard Edition</title>
    <style>
        body { margin: 0; background: #121212; color: #fff; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { border: 5px solid #333; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .stats { margin-bottom: 10px; text-align: center; }
        .timer { font-size: 2.5rem; color: #00ff41; text-shadow: 0 0 5px #00ff41; }
        .hint { color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="stats">
        <div class="timer" id="timer">0.00</div>
        <div id="msg">PRESS ANY KEY TO START</div>
    </div>
    
    <canvas id="game" width="450" height="450"></canvas>

    <div class="hint">Use <b>WASD</b> or <b>ARROW KEYS</b> to move</div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const timerEl = document.getElementById('timer');
    const msgEl = document.getElementById('msg');

    let isPlaying = false;
    let startTime;
    let score = 0;

    const player = {
        x: 210, y: 210, size: 25, speed: 5,
        keys: {}
    };

    let enemies = [];

    function initEnemies() {
        // Enemies spawn at corners/edges but head toward the center (225, 225)
        enemies = [
            { x: 0,   y: 0,   w: 60, h: 50, vx: 2.2, vy: 1.8 },
            { x: 390, y: 0,   w: 100, h: 20, vx: -2.0, vy: 2.5 },
            { x: 0,   y: 390, w: 30, h: 60, vx: 2.5, vy: -2.0 },
            { x: 390, y: 390, w: 60, h: 60, vx: -1.8, vy: -2.2 }
        ];
    }

    function reset() {
        player.x = 212;
        player.y = 212;
        initEnemies();
        score = 0;
        timerEl.innerText = "0.00";
    }

    function update() {
        if (!isPlaying) return;

        // Timer
        score = (Date.now() - startTime) / 1000;
        timerEl.innerText = score.toFixed(2);

        // Player Movement
        if (player.keys['w'] || player.keys['ArrowUp'])    player.y -= player.speed;
        if (player.keys['s'] || player.keys['ArrowDown'])  player.y += player.speed;
        if (player.keys['a'] || player.keys['ArrowLeft'])  player.x -= player.speed;
        if (player.keys['d'] || player.keys['ArrowRight']) player.x += player.speed;

        // Border Collision
        if (player.x < 0 || player.x + player.size > 450 || player.y < 0 || player.y + player.size > 450) {
            gameOver();
        }

        // Enemy Logic
        let difficulty = 1 + (score * 0.03); // Get faster over time
        enemies.forEach(en => {
            en.x += en.vx * difficulty;
            en.y += en.vy * difficulty;

            // Bounce off walls
            if (en.x <= 0 || en.x + en.w >= 450) en.vx *= -1;
            if (en.y <= 0 || en.y + en.h >= 450) en.vy *= -1;

            // Hit Player?
            if (player.x < en.x + en.w && player.x + player.size > en.x &&
                player.y < en.y + en.h && player.y + player.size > en.y) {
                gameOver();
            }
        });

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, 450, 450);

        // Player
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(player.x, player.y, player.size, player.size);

        // Enemies
        ctx.fillStyle = '#3399ff';
        enemies.forEach(en => {
            ctx.fillRect(en.x, en.y, en.w, en.h);
        });
    }

    function gameOver() {
        isPlaying = false;
        msgEl.innerText = "CRASHED! PRESS ANY KEY TO RETRY";
    }

    window.addEventListener('keydown', (e) => {
        player.keys[e.key] = true;
        if (!isPlaying) {
            isPlaying = true;
            startTime = Date.now();
            msgEl.innerText = "DODGE!";
            reset();
            update();
        }
    });

    window.addEventListener('keyup', (e) => {
        player.keys[e.key] = false;
    });

    initEnemies();
    draw();
</script>
</body>
</html>
