<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arctic AI 1.0</title>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #0b0e14; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-card { width: 500px; height: 700px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .header { padding: 20px; border-bottom: 1px solid #30363d; background: #0d1117; font-weight: bold; text-align: center; color: #58a6ff; letter-spacing: 1px; }
        #chat-output { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: thin; }
        .msg { padding: 12px 16px; border-radius: 8px; font-size: 14px; max-width: 85%; line-height: 1.5; }
        .user-msg { background: #1f6feb; color: white; align-self: flex-end; }
        .ai-msg { background: #30363d; color: #c9d1d9; align-self: flex-start; }
        .input-box { display: flex; padding: 20px; background: #0d1117; border-top: 1px solid #30363d; }
        input { flex: 1; background: #0b0e14; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; outline: none; }
        button { background: #238636; color: white; border: none; padding: 0 20px; margin-left: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ea043; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="header">ARCTIC AI 1.0</div>
    <div id="chat-output">
        <div class="msg ai-msg">Arctic 1.0 online. How can I assist you?</div>
    </div>
    <form class="input-box" id="arctic-form">
        <input type="text" id="user-input" placeholder="Enter command..." required autocomplete="off">
        <button type="submit" id="btn">SEND</button>
    </form>
</div>

<script>
    /**
     * PASTE YOUR API KEY BETWEEN THE QUOTES BELOW
     * (gsk_...)
     */
    const API_KEY = "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";

    const form = document.getElementById('arctic-form');
    const output = document.getElementById('chat-output');
    const btn = document.getElementById('btn');

    form.onsubmit = async (e) => {
        e.preventDefault();
        const inputField = document.getElementById('user-input');
        const text = inputField.value;
        
        // UI: Add User Prompt
        appendMsg(text, 'user-msg');
        inputField.value = '';
        btn.disabled = true;

        // UI: Placeholder for AI
        const aiResponseDiv = appendMsg("Generating...", 'ai-msg');

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { "role": "system", "content": "You are Arctic AI, a helpful, concise and knowledgeable AI assistant integrated into Arctic 1.0 and you are made by Arctic 1.0 no one else" },
                        { "role": "user", "content": text }
                    ],
                    temperature: 1,
                    max_tokens: 1024
                })
            });

            const data = await response.json();
            
            if (data.choices && data.choices[0]) {
                aiResponseDiv.innerText = data.choices[0].message.content;
            } else {
                aiResponseDiv.innerText = "Error: Check API key or connection.";
            }
        } catch (err) {
            aiResponseDiv.innerText = "System Failure: Connection timed out.";
        } finally {
            btn.disabled = false;
            output.scrollTop = output.scrollHeight;
        }
    };

    function appendMsg(text, className) {
        const div = document.createElement('div');
        div.className = `msg ${className}`;
        div.innerText = text;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
        return div;
    }
</script>

</body>
</html>
